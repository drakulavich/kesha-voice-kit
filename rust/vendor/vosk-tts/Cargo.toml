[package]
name = "vosk_tts"
version = "0.1.0-kesha"
edition = "2021"
description = "Vendored runtime subset of vosk-tts-rs (Apache 2.0). Drops gRPC/server/CLI/model-fetch/tokenizers stack to keep Windows MSVC linkable. See rust/vendor/vosk-tts/LICENSE and NOTICE."
license = "Apache-2.0"
publish = false

[lib]
name = "vosk_tts"
path = "src/lib.rs"

[dependencies]
ort = "2.0.0-rc.12"
ndarray = "0.17"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1"
regex = "1.11"

[dev-dependencies]
tempfile = "3"
