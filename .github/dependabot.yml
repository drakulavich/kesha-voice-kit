version: 2
updates:
  # CLI / TS deps
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      npm-dev:
        dependency-type: development
        update-types:
          - minor
          - patch
      npm-prod:
        dependency-type: production
        update-types:
          - patch

  # Rust (cargo) deliberately NOT tracked by Dependabot (#165).
  # Every cargo update attempt fails with curl error [8] "Weird server line"
  # against the crates.io sparse index (https://index.crates.io) — the
  # Dependabot runner image ships a libcurl that mishandles the sparse
  # HTTP framing, and no cargo PR has ever merged successfully since we
  # added the ecosystem in PR #160.
  # Replacement signal: `.github/workflows/cargo-dependency-maintenance.yml`
  # opens a monthly checklist issue for the manual `cargo update` pass.
  # Revisit Dependabot once it ships a fix upstream.

  # Workflow action versions across .github/workflows/*.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch

  # Docker base image updates.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
