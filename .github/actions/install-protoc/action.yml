name: Install protoc
description: >
  Install the protobuf compiler. Required by `vosk-tts-rs`'s build script
  (`prost-build` invokes protoc to generate Rust from proto/tts_service.proto).
  Skips when protoc is already on PATH.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        if command -v protoc >/dev/null 2>&1; then
          echo "protoc already installed: $(protoc --version)"
          exit 0
        fi
        case "${{ runner.os }}" in
          macOS)   brew install protobuf ;;
          Linux)   sudo apt-get update && sudo apt-get install -y protobuf-compiler ;;
          Windows) choco install protoc -y --no-progress ;;
          *)       echo "::error::Unsupported runner OS: ${{ runner.os }}"; exit 1 ;;
        esac
