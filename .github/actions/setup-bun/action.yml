name: Setup Bun Workspace
description: Setup Bun (version pinned in .bun-version), restore the Bun cache, and install dependencies

runs:
  using: composite
  steps:
    - name: 🍞 Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        # Single source of truth for the Bun version: the repo-root .bun-version
        # file. The repo is always checked out before this composite runs (it
        # lives in-repo), so the file is guaranteed present.
        bun-version-file: .bun-version

    - name: 💾 Cache dependencies
      uses: actions/cache@v5
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: ${{ runner.os }}-bun-

    - name: 📦 Install dependencies
      run: bun install
      shell: bash
