name: 🔨 Build CoreML

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: swift/
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 💾 Cache Swift packages
        uses: actions/cache@v5
        with:
          path: swift/.build
          key: ${{ runner.os }}-swift-${{ hashFiles('swift/Package.resolved') }}
          restore-keys: ${{ runner.os }}-swift-

      - name: 🔨 Build release binary
        run: swift build -c release

      - name: 📦 Prepare artifact
        run: cp .build/release/ParakeetCoreML ../parakeet-coreml-darwin-arm64

      - name: 🚀 Create release with binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            ../parakeet-coreml-darwin-arm64 \
            --title "${{ github.ref_name }}" \
            --generate-notes
