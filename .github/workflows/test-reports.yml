name: 📊 Test Reports

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-report:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 💾 Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: 💾 Cache CoreML backend
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/parakeet/coreml
            ~/Library/Caches/FluidAudio
          key: ${{ runner.os }}-parakeet-coreml-v3
          restore-keys: ${{ runner.os }}-parakeet-coreml-

      - name: 📦 Install dependencies
        run: bun install

      - name: 🦜 Install parakeet backend
        run: bun run src/cli.ts install

      - name: 🎬 Install ffmpeg
        run: which ffmpeg || brew install ffmpeg

      - name: 🧪 Run tests
        run: mkdir -p allure-results && bun test --reporter=junit --reporter-outfile=allure-results/results.xml
        continue-on-error: true

      - name: 📊 Generate Allure report
        run: bunx allure generate allure-results --output allure-report --report-name "Parakeet CLI Tests"

      - name: 📜 Load history and prepare deploy
        run: bun .github/scripts/load-allure-history.ts

      - name: 🚀 Publish report
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_branch: gh-pages
          publish_dir: deploy
          keep_files: true
