name: "🛡️ Security Audit"

on:
  pull_request:
    paths:
      - "rust/Cargo.toml"
      - "rust/Cargo.lock"
      - "rust/deny.toml"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/security.yml"
  schedule:
    # Weekly advisory-DB re-check against unchanged deps (RUSTSEC/npm
    # advisories update independently of our code). Offset from the
    # monthly cargo-dependency-maintenance cron so they don't collide.
    - cron: "23 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Only the scheduled run needs to upsert the findings issue.
      issues: write
    steps:
      - uses: actions/checkout@v6
      - id: deny
        uses: EmbarkStudios/cargo-deny-action@a531616d8ce3b9177443e48a1159bc945a099823 # v2.0.19
        with:
          manifest-path: rust/Cargo.toml
          command: check advisories licenses bans sources
        continue-on-error: true
      - name: Report findings (scheduled only)
        if: github.event_name == 'schedule' && steps.deny.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo "## cargo-deny findings ($(date -u +%Y-%m-%d))"
            echo
            echo "The weekly advisory re-check failed. Run \`cd rust && cargo deny check\` locally and triage into \`rust/deny.toml\`."
            echo
            echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > /tmp/audit-body.md
          bash .github/scripts/upsert-audit-issue.sh /tmp/audit-body.md
      - name: Fail job if deny failed on PR
        if: github.event_name != 'schedule' && steps.deny.outcome == 'failure'
        run: |
          echo "::warning::cargo-deny reported findings (non-blocking until promotion PR)"
          exit 1

  bun-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Only the scheduled run needs to upsert the findings issue.
      issues: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - name: Install deps (frozen lockfile)
        run: bun install --frozen-lockfile
      - id: audit
        name: Audit JS dependencies
        run: bun audit --audit-level=high
        continue-on-error: true
      - name: Report findings (scheduled only)
        if: github.event_name == 'schedule' && steps.audit.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo "## bun audit findings ($(date -u +%Y-%m-%d))"
            echo
            echo "The weekly JS advisory re-check failed. Run \`bun audit --audit-level=high\` locally and resolve (\`bun update\` or a patched dependency release)."
            echo
            echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > /tmp/bun-audit-body.md
          bash .github/scripts/upsert-audit-issue.sh /tmp/bun-audit-body.md "JS security audit findings (weekly)"
      - name: Fail job if audit failed on PR
        if: github.event_name != 'schedule' && steps.audit.outcome == 'failure'
        run: |
          echo "::warning::bun audit reported findings (non-blocking until promotion PR)"
          exit 1
