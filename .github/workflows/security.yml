name: "🛡️ Security Audit"

on:
  # Run on EVERY PR (no top-level path filter). A path-filtered workflow is
  # skipped on unrelated PRs, so its required status checks never report and
  # permanently block the PR. A cheap `changes` job always runs; the audit jobs
  # gate on its output (skipped jobs report success, satisfying branch
  # protection) so docs-only PRs aren't blocked.
  pull_request:
  schedule:
    # Weekly advisory-DB re-check against unchanged deps (RUSTSEC/npm
    # advisories update independently of our code). Offset from the
    # monthly cargo-dependency-maintenance cron so they don't collide.
    - cron: "23 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # Always runs so the required checks always report; outputs gate the audits.
  changes:
    runs-on: ubuntu-latest
    outputs:
      deps: ${{ steps.filter.outputs.deps }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            deps:
              - 'rust/Cargo.toml'
              - 'rust/Cargo.lock'
              - 'rust/deny.toml'
              - 'package.json'
              - 'bun.lock'
              - '.github/workflows/security.yml'

  cargo-deny:
    needs: changes
    # Run for scheduled/manual audits, or on PRs that touch dependencies. On a
    # PR that doesn't, this skips → reports success → satisfies branch protection.
    if: github.event_name != 'pull_request' || needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Only the scheduled run needs to upsert the findings issue.
      issues: write
    steps:
      - uses: actions/checkout@v7
      - id: deny
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          manifest-path: rust/Cargo.toml
          command: check advisories licenses bans sources
        continue-on-error: true
      - name: Report findings (scheduled only)
        if: github.event_name == 'schedule' && steps.deny.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo "## cargo-deny findings ($(date -u +%Y-%m-%d))"
            echo
            echo "The weekly advisory re-check failed. Run \`cd rust && cargo deny check\` locally and triage into \`rust/deny.toml\`."
            echo
            echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > /tmp/audit-body.md
          bash .github/scripts/upsert-audit-issue.sh /tmp/audit-body.md
      - name: Fail job if deny failed on PR
        if: github.event_name != 'schedule' && steps.deny.outcome == 'failure'
        run: |
          echo "::warning::cargo-deny reported findings (non-blocking until promotion PR)"
          exit 1

  bun-audit:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Only the scheduled run needs to upsert the findings issue.
      issues: write
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      - name: Install deps (frozen lockfile)
        run: bun install --frozen-lockfile
      - id: audit
        name: Audit JS dependencies
        run: bun audit --audit-level=high
        continue-on-error: true
      - name: Report findings (scheduled only)
        if: github.event_name == 'schedule' && steps.audit.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo "## bun audit findings ($(date -u +%Y-%m-%d))"
            echo
            echo "The weekly JS advisory re-check failed. Run \`bun audit --audit-level=high\` locally and resolve (\`bun update\` or a patched dependency release)."
            echo
            echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > /tmp/bun-audit-body.md
          bash .github/scripts/upsert-audit-issue.sh /tmp/bun-audit-body.md "JS security audit findings (weekly)"
      - name: Fail job if audit failed on PR
        if: github.event_name != 'schedule' && steps.audit.outcome == 'failure'
        run: |
          echo "::warning::bun audit reported findings (non-blocking until promotion PR)"
          exit 1

  # Aggregator gate = the single required status check for branch protection.
  # Always runs so the context reports on every PR (the audits skip on PRs that
  # don't touch dependencies → success); fails only if a real job failed.
  security-audit:
    name: 🛡️ Security Audit
    if: always()
    needs: [changes, cargo-deny, bun-audit]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
