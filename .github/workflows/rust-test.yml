name: "🧪 Rust Tests"

on:
  # Run on EVERY PR (no top-level path filter). A path-filtered workflow is
  # skipped on unrelated PRs, so its required status check never reports and
  # permanently blocks the PR (e.g. a docs-only change). Instead a cheap
  # `changes` job always runs and the expensive rust jobs gate on its output —
  # skipped jobs report success, satisfying branch protection.
  pull_request:
  push:
    branches: [main]
    paths:
      - "rust/**"
      - ".github/workflows/rust-test.yml"

permissions:
  contents: read

jobs:
  # Always runs (even on docs PRs) so the workflow concludes successfully and
  # its required check reports; outputs gate the heavy rust jobs below.
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'rust/**'
              - '.github/workflows/rust-test.yml'
              - '.github/scripts/check-coverage.ts'
              - 'package.json'
              - 'bun.lock'

  lint-ubuntu:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install system audio deps (Opus)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libopus-dev pkg-config

      - name: Check formatting
        run: cd rust && cargo fmt -- --check

      - name: Clippy
        run: bash rust/ci/run-clippy.sh Linux

  test:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.rust == 'true'
    permissions:
      contents: read
      # Flakiness.io CLI authenticates via GitHub OIDC; scope the
      # write capability to this job only so a future second job in
      # this workflow doesn't inherit it implicitly (symmetric with
      # the per-job scoping in ci.yml per Greptile #301).
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      KOKORO_CACHE: ${{ github.workspace }}/.kokoro-spike
      MACOSX_DEPLOYMENT_TARGET: "14.0"
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 16 (Swift 6)
        if: matrix.os == 'macos-14'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      # `cargo nextest` replaces `cargo test` for the actual run — it
      # parallelizes per-binary, surfaces flakiness explicitly, and emits
      # JUnit XML via the `ci` profile (see rust/.config/nextest.toml).
      # taiki-e/install-action caches a prebuilt binary per OS/arch so
      # the install is ~1s on warm cache.
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'

      - name: Pin MSVC linker (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        # Git for Windows ships a GNU `link.exe` under /c/Program Files/Git/usr/bin
        # that shadows MSVC's link.exe under `shell: bash`. Pin via cargo's env
        # knob so PATH ordering doesn't matter.
        run: |
          $linkPath = (Get-Command link.exe |
            Where-Object { $_.Source -notlike "*Git*usr*" } |
            Select-Object -First 1).Source
          if (-not $linkPath) { Write-Error "MSVC link.exe not found"; exit 1 }
          Write-Host "MSVC linker: $linkPath"
          Add-Content -Path $env:GITHUB_ENV -Value "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=$linkPath"

      - name: Install system audio deps (Opus)
        # audiopus_sys 0.2.2 / opusic-sys 0.6.0 (added in #224 for OGG/Opus
        # output) try pkg-config first; on miss they fall back to a vendored
        # libopus build via cmake whose CMakeLists.txt declares
        # `cmake_minimum_required(VERSION <3.5)`. Linux/macOS: install the
        # system lib so pkg-config succeeds and cmake never runs. Windows:
        # set `CMAKE_POLICY_VERSION_MINIMUM=3.5` so the cmake fallback build
        # is forgiven (cheaper than vcpkg-installing opus).
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends libopus-dev pkg-config
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install opus pkg-config
          fi

      - name: Allow legacy cmake_minimum_required (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_POLICY_VERSION_MINIMUM=3.5"

      # Guard against coreml-backend rot: v1.0.0 shipped with broken
      # coreml code because no PR CI job ever tried to build it.
      - name: Check coreml feature
        if: matrix.os == 'macos-14'
        run: cd rust && cargo check --features coreml --no-default-features

      # The default-feature nextest run (`run-cargo-test.sh`) builds only
      # `onnx,tts`, so the darwin-arm64 FluidAudio paths — `system_kokoro`
      # (#475 `--rate`), `system_diarize`, `system_tts` — and their gated
      # integration tests (`kokoro_rate_e2e.rs`, `diarize_e2e.rs`) never
      # compile in PR CI. The runtime e2e bodies can't run here (the ANE
      # Kokoro model isn't downloaded on the runner; it's a local /
      # release-smoke gate), but `--all-targets` clippy at least type-checks
      # and lints the test code + the install-time voice-pack staging so a
      # darwin-only break is caught before a release tag builds it.
      - name: Lint darwin release feature set (incl. system_kokoro)
        if: matrix.os == 'macos-14'
        run: |
          cd rust
          cargo clippy --all-targets \
            --features coreml,tts,system_tts,system_kokoro,system_diarize,system_text_lang \
            --no-default-features -- -D warnings

      - name: Cache Kokoro spike models
        uses: actions/cache@v5
        with:
          path: ${{ env.KOKORO_CACHE }}
          key: kokoro-spike-v5-${{ runner.os }}

      - name: Download Kokoro model (if cache miss)
        shell: bash
        run: bash rust/ci/download-kokoro.sh "$KOKORO_CACHE"

      - name: Run tests (with real Kokoro)
        shell: bash
        run: bash rust/ci/run-cargo-test.sh "$KOKORO_CACHE" "${{ runner.os }}"

      - name: 📤 Upload JUnit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rust-junit-${{ matrix.os }}
          path: rust/target/nextest/ci/junit.xml
          retention-days: 7

      # The npm Flakiness CLI runs everywhere bun runs, so unlike the
      # platform-specific curl installer it covers windows-latest too.
      # Setup-bun is a no-op when bun is already on PATH (cached on warm
      # runs).
      - uses: oven-sh/setup-bun@v2
        if: always()
        with:
          bun-version-file: .bun-version

      - name: 🪼 Upload to Flakiness.io
        # `if: always()` runs the step but doesn't suppress its exit
        # code; `continue-on-error: true` keeps a Flakiness outage /
        # OIDC handshake failure off the test-job verdict (Greptile
        # #301 P1). Telemetry upload is best-effort, not a release gate.
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          bunx @flakiness/junit-xml rust/target/nextest/ci/junit.xml \
            --category rust --flakiness-project Laputa/kesha-voice-kit

  coverage:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.rust == 'true'
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KOKORO_CACHE: ${{ github.workspace }}/.kokoro-spike
      NEXTEST_PROFILE: ci
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install system audio deps (Opus)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libopus-dev pkg-config

      - name: Cache Kokoro spike models
        uses: actions/cache@v5
        with:
          path: ${{ env.KOKORO_CACHE }}
          key: kokoro-spike-v5-${{ runner.os }}

      - name: Download Kokoro model (if cache miss)
        shell: bash
        run: bash rust/ci/download-kokoro.sh "$KOKORO_CACHE"

      - name: 📈 Rust coverage
        shell: bash
        run: |
          if [[ -f "$KOKORO_CACHE/model.onnx" && -f "$KOKORO_CACHE/am_michael.bin" ]]; then
            export KOKORO_MODEL="$KOKORO_CACHE/model.onnx"
            export KOKORO_VOICE="$KOKORO_CACHE/am_michael.bin"
            echo "KOKORO_MODEL=$KOKORO_CACHE/model.onnx" >> "$GITHUB_ENV"
            echo "KOKORO_VOICE=$KOKORO_CACHE/am_michael.bin" >> "$GITHUB_ENV"
          fi
          if [[ -f "$KOKORO_CACHE/models/vosk-ru/model.onnx" && -f "$KOKORO_CACHE/models/vosk-ru/bert/model.onnx" ]]; then
            export KESHA_CACHE_DIR="$KOKORO_CACHE"
            echo "KESHA_CACHE_DIR=$KOKORO_CACHE" >> "$GITHUB_ENV"
          fi
          bun run coverage:rust

      - name: 📤 Upload Ubuntu JUnit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rust-junit-ubuntu-latest
          path: rust/target/nextest/ci/junit.xml
          retention-days: 7

      - name: 🪼 Upload Ubuntu tests to Flakiness.io
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          if [[ ! -f rust/target/nextest/ci/junit.xml ]]; then
            echo "No Ubuntu JUnit report found; skipping Flakiness.io upload."
            exit 0
          fi
          bunx @flakiness/junit-xml rust/target/nextest/ci/junit.xml \
            --category rust --flakiness-project Laputa/kesha-voice-kit

      - name: 🧯 Enforce Rust coverage gates
        run: bun run coverage:check:rust

      - name: 📊 Coverage summary
        if: always()
        shell: bash
        run: |
          if [[ -f coverage/rust/summary.md ]]; then
            cat coverage/rust/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 📤 Upload Rust coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-rust
          path: coverage/rust
          retention-days: 30

  rust-push-gate:
    # Lean post-merge gate: catches semantic merge conflicts (two PRs green
    # alone, broken together) fast and cheap. The 3-OS matrix already ran on
    # the PR; build-engine.yml is the cross-platform release gate. Ubuntu-only
    # on purpose.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Install system audio deps (Opus)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libopus-dev pkg-config
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - name: Check formatting
        run: cd rust && cargo fmt -- --check
      - name: Clippy
        run: bash rust/ci/run-clippy.sh Linux
      - name: Tests
        run: cd rust && cargo nextest run --features tts
