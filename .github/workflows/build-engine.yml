name: "🔨 Build Engine"

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (tag, branch, or SHA)"
        required: false
        default: "main"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            features: coreml
            binary: kesha-engine-darwin-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: onnx
            binary: kesha-engine-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            features: onnx
            binary: kesha-engine-windows-x64.exe
    runs-on: ${{ matrix.os }}
    env:
      # Target macOS 14 so the Swift compiler treats concurrency as
      # OS-provided and does not emit an explicit @rpath dependency on
      # libswift_Concurrency.dylib (which no longer ships as a standalone
      # file on macOS 26+).
      MACOSX_DEPLOYMENT_TARGET: "14.0"
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 16 (Swift 6)
        if: matrix.os == 'macos-14'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Build release binary
        run: cd rust && cargo build --release --target ${{ matrix.target }} --features ${{ matrix.features }} --no-default-features
      - name: Prepare artifact
        shell: bash
        run: |
          src="rust/target/${{ matrix.target }}/release/kesha-engine"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then src="${src}.exe"; fi
          cp "$src" "${{ matrix.binary }}"
      - name: Smoke-test binary
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          chmod +x "${{ matrix.binary }}"
          "./${{ matrix.binary }}" --capabilities-json
      - name: Inspect macOS dynamic deps
        if: matrix.os == 'macos-14'
        shell: bash
        run: otool -L "${{ matrix.binary }}" && otool -l "${{ matrix.binary }}" | grep -A2 LC_RPATH || true
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create draft release with binaries
        uses: softprops/action-gh-release@v3
        with:
          files: |
            kesha-engine-darwin-arm64
            kesha-engine-linux-x64
            kesha-engine-windows-x64.exe
          draft: true
