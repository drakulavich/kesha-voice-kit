name: "🔨 Build Engine"

on:
  push:
    # Match real engine-release tags ("v1.0.2") but skip CLI-only marker
    # tags ("v1.0.8-cli"). CLI-only patches do not rebuild the Rust
    # engine — a separate marker release is created manually via
    # `gh release create v<X.Y.Z>-cli --notes-file ...` without
    # triggering this workflow. See CLAUDE.md → RELEASE PROCESS.
    tags:
      - "v*"
      - "!v*-cli"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (tag, branch, or SHA)"
        required: false
        default: "main"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            features: coreml,tts
            binary: kesha-engine-darwin-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: onnx,tts
            binary: kesha-engine-linux-x64
          # Windows ships without TTS pending `choco install espeak-ng` path
          # verification (see rust-test.yml matrix note).
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            features: onnx
            binary: kesha-engine-windows-x64.exe
    runs-on: ${{ matrix.os }}
    env:
      # Target macOS 14 so the Swift compiler treats concurrency as
      # OS-provided and does not emit an explicit @rpath dependency on
      # libswift_Concurrency.dylib (which no longer ships as a standalone
      # file on macOS 26+).
      MACOSX_DEPLOYMENT_TARGET: "14.0"
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 16 (Swift 6)
        if: matrix.os == 'macos-14'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Install espeak-ng (macOS)
        if: matrix.os == 'macos-14'
        run: brew install espeak-ng
      - name: Install espeak-ng (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y espeak-ng libespeak-ng-dev
      - name: Build release binary
        env:
          # macOS needs bindgen + linker flags for the espeak-ng crate.
          LIBCLANG_PATH: ${{ matrix.os == 'macos-14' && '/Library/Developer/CommandLineTools/usr/lib' || '' }}
          RUSTFLAGS: ${{ matrix.os == 'macos-14' && '-L /opt/homebrew/lib' || '' }}
        run: cd rust && cargo build --release --target ${{ matrix.target }} --features ${{ matrix.features }} --no-default-features
      - name: Prepare artifact
        shell: bash
        run: |
          src="rust/target/${{ matrix.target }}/release/kesha-engine"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then src="${src}.exe"; fi
          cp "$src" "${{ matrix.binary }}"
      - name: Smoke-test binary
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          chmod +x "${{ matrix.binary }}"
          "./${{ matrix.binary }}" --capabilities-json
      - name: Inspect macOS dynamic deps
        if: matrix.os == 'macos-14'
        shell: bash
        run: otool -L "${{ matrix.binary }}" && otool -l "${{ matrix.binary }}" | grep -A2 LC_RPATH || true
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create draft release with binaries
        uses: softprops/action-gh-release@v3
        with:
          files: |
            kesha-engine-darwin-arm64
            kesha-engine-linux-x64
            kesha-engine-windows-x64.exe
          draft: true
