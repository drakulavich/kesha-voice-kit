name: "🔨 Build Engine"

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            features: onnx
            binary: parakeet-engine-darwin-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: onnx
            binary: parakeet-engine-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            features: onnx
            binary: parakeet-engine-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Build release binary
        run: cd rust && cargo build --release --target ${{ matrix.target }} --features ${{ matrix.features }} --no-default-features
      - name: Prepare artifact
        shell: bash
        run: |
          src="rust/target/${{ matrix.target }}/release/parakeet-engine"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then src="${src}.exe"; fi
          cp "$src" "${{ matrix.binary }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            parakeet-engine-darwin-arm64
            parakeet-engine-linux-x64
            parakeet-engine-windows-x64.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
