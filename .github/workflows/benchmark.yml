name: 🏎️ Benchmark

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 💾 Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: 💾 Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-faster-whisper
          restore-keys: ${{ runner.os }}-pip-

      - name: 💾 Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-whisper-medium-int8
          restore-keys: ${{ runner.os }}-hf-

      - name: 🎬 Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: 📦 Install dependencies
        run: bun install

      - name: 🏎️ Run benchmark
        env:
          HF_HUB_DISABLE_TELEMETRY: "1"
          BENCHMARK_SUMMARY: benchmark-summary.json
        run: bun scripts/benchmark.ts > benchmark-results.md

      - name: 📊 Print results
        run: cat benchmark-results.md

      - name: 🔍 Check regression
        run: bun .github/scripts/check-regression.ts benchmark-summary.json BENCHMARK.md

      - name: 📝 Update BENCHMARK.md
        run: bun .github/scripts/update-benchmark-md.ts benchmark-results.md BENCHMARK.md

      - name: 📝 Commit results
        run: bun .github/scripts/commit-and-push.ts BENCHMARK.md
