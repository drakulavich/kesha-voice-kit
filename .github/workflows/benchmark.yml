name: Benchmark

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          ref: main

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-faster-whisper
          restore-keys: ${{ runner.os }}-pip-

      - run: bun install

      - name: Install parakeet backend
        run: bun run src/cli.ts install

      - name: Run benchmark
        run: bash scripts/benchmark.sh > BENCHMARK.md

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add BENCHMARK.md
          git diff --cached --quiet || git commit -m "benchmark: update results for ${{ github.event.release.tag_name || 'manual run' }}"
          git push
