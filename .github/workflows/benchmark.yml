name: Benchmark

on:
  workflow_run:
    workflows: ["Build CoreML Swift Binary"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
          ref: main

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 💾 Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: 💾 Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-faster-whisper
          restore-keys: ${{ runner.os }}-pip-

      - name: 💾 Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-whisper-medium-int8
          restore-keys: ${{ runner.os }}-hf-

      - name: 💾 Cache CoreML model
        if: runner.os == 'macOS'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/parakeet/coreml
            ~/Library/Caches/FluidAudio
          key: ${{ runner.os }}-parakeet-coreml-v3
          restore-keys: ${{ runner.os }}-parakeet-coreml-

      - name: 🎬 Install ffmpeg
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ffmpeg

      - name: 📦 Install dependencies
        run: bun install

      - name: 🏎️ Run benchmark
        env:
          HF_HUB_DISABLE_TELEMETRY: "1"
          BENCHMARK_SUMMARY: benchmark-summary.json
        run: bash scripts/benchmark.sh > benchmark-results.md

      - name: 📊 Print results
        run: cat benchmark-results.md

      - name: 📤 Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.os }}
          path: |
            benchmark-results.md
            benchmark-summary.json
          retention-days: 7

  publish:
    needs: benchmark
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: 📥 Download Ubuntu results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-ubuntu-latest
          path: results

      - name: 🔍 Check regression
        run: python3 .github/scripts/check-regression.py results/benchmark-summary.json BENCHMARK.md

      - name: 📝 Update BENCHMARK.md
        run: python3 .github/scripts/update-benchmark-md.py results/benchmark-results.md BENCHMARK.md

      - name: 📝 Commit results
        run: bash .github/scripts/commit-and-push.sh BENCHMARK.md
