name: 🏎️ Benchmark

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: 🍞 Setup Bun workspace
        uses: ./.github/actions/setup-bun

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 💾 Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-faster-whisper
          restore-keys: ${{ runner.os }}-pip-

      - name: 💾 Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-whisper-medium-int8
          restore-keys: ${{ runner.os }}-hf-

      - name: 🦜 Setup benchmark backend
        uses: ./.github/actions/install-parakeet-backend
        with:
          cache-path: ~/.cache/parakeet/v3
          cache-key: ${{ runner.os }}-parakeet-onnx-v3
          cache-restore-keys: ${{ runner.os }}-parakeet-onnx-
          ffmpeg-provider: apt
          install-args: --onnx

      - name: 🏎️ Run benchmark
        env:
          HF_HUB_DISABLE_TELEMETRY: "1"
          BENCHMARK_SUMMARY: benchmark-summary.json
        run: bun scripts/benchmark.ts > benchmark-results.md

      - name: 📊 Print results
        run: cat benchmark-results.md

      - name: 🔍 Check regression
        run: bun .github/scripts/check-regression.ts benchmark-summary.json BENCHMARK.md

      - name: 📝 Update BENCHMARK.md
        run: bun .github/scripts/update-benchmark-md.ts benchmark-results.md BENCHMARK.md

      - name: 📝 Commit results
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun .github/scripts/commit-and-push.ts BENCHMARK.md
