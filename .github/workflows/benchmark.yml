name: Benchmark

on:
  workflow_run:
    workflows: ["Build CoreML Swift Binary"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: macos-15
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          ref: main

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-faster-whisper
          restore-keys: ${{ runner.os }}-pip-

      - run: bun install

      - name: Run benchmark
        run: |
          CI_RESULTS=$(bash scripts/benchmark.sh)
          python3 -c "
          import re, sys
          content = open('BENCHMARK.md').read()
          replacement = sys.argv[1]
          pattern = r'(<!-- CI-BENCHMARK-START -->).*?(<!-- CI-BENCHMARK-END -->)'
          updated = re.sub(pattern, r'\1\n' + replacement + r'\n\2', content, flags=re.DOTALL)
          open('BENCHMARK.md', 'w').write(updated)
          " "$CI_RESULTS"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add BENCHMARK.md
          git diff --cached --quiet || git commit -m "benchmark: update CI results for $(bun run src/cli.ts --version)"
          git push
