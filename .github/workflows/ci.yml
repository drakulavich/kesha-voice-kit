name: 🧪 CI

on:
  pull_request:
    branches: [main]
  # Also run on push to main to catch regressions that slip through admin
  # force-merges, post-merge hotfixes, or any other code path that lands on
  # main without exercising the PR gate. The `changes` path-filter still
  # applies — on push events, dorny/paths-filter diffs against the previous
  # commit on `main`, so an unrelated touch doesn't run the full matrix.
  push:
    branches: [main]
  # Nightly heavy real-engine e2e on main: model-format/engine drift gate, and
  # it warms the default-branch-scoped model cache so PR heavy runs restore it.
  schedule:
    - cron: '0 4 * * *'

permissions:
  contents: read
  # `id-token: write` is NOT granted at workflow scope — it's elevated
  # only on the three test jobs that actually upload to Flakiness.io
  # (Greptile #301 P1 security finding). `changes`, `raycast-lint`, and
  # `nix-build` run third-party actions and don't need OIDC capability.
  # `pull-requests: write` was previously needed for a sticky test-results
  # comment; removed alongside #303 when Flakiness.io took over the
  # "where did the tests land" surface.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      integration: ${{ steps.filter.outputs.integration }}
      heavy_e2e: ${{ steps.filter.outputs.heavy_e2e }}
      raycast: ${{ steps.filter.outputs.raycast }}
      nix: ${{ steps.filter.outputs.nix }}
      workflows: ${{ steps.filter.outputs.workflows }}
      homebrew: ${{ steps.filter.outputs.homebrew }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 🔍 Detect changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          # Filter design (post-#280):
          # - `code` is the SUPERSET. Anything that should trigger TS unit-tests
          #   sits here. `integration` is a STRICT SUBSET of `code` so whenever
          #   `integration-tests` fires, `unit-tests` is guaranteed to fire too
          #   — the `needs: unit-tests` gate then evaluates predictably without
          #   the skip-propagation hazard that #274 + the pre-rewrite of #280
          #   silently fell into.
          # - `heavy_e2e` gates the model-DOWNLOADING lanes (integration-tests-full,
          #   published-engine-smoke, tts-e2e): engine/model paths only (rust/**,
          #   model pins, the real-engine e2e test files) — deliberately NOT
          #   `src/**`, so TS-only PRs skip the 2.4GB download (the fake/stub
          #   suites cover the TS contract in the fast lane). It is NOT a subset
          #   of `code` (it includes `rust/**`), so those lanes use an
          #   `always() && unit-tests != failure` gate to survive a legitimately
          #   skipped `unit-tests` on a rust-only PR (the #274 skip hazard).
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'tests/fixtures/**'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig.json'
              # `rust/Cargo.toml` is in the SUPERSET filter so the
              # version-drift check (#267 F16) always fires on a
              # Cargo-only version bump PR. Without it, `unit-tests`
              # skipped entirely and the drift merged undetected
              # (Greptile P1 on #315).
              - 'rust/Cargo.toml'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            integration:
              - 'src/**'
              - 'tests/integration/**'
              - 'tests/fixtures/**'
              - 'package.json'
              - 'bun.lock'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            heavy_e2e:
              - 'rust/**'
              - 'package.json'
              - 'bun.lock'
              - 'tests/fixtures/**'
              - 'tests/integration/e2e-engine.test.ts'
              - 'tests/integration/mcp-e2e.test.ts'
              - 'tests/integration/say-e2e.test.ts'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            raycast:
              - 'raycast/**'
              - '.github/workflows/ci.yml'
            nix:
              - 'flake.nix'
              - 'flake.lock'
              - 'rust/**'
              - 'package.json'
              - '.github/workflows/ci.yml'
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'
              - '.github/scripts/**'
              - 'package.json'
              - 'bun.lock'
            homebrew:
              - 'packaging/homebrew/Formula/**'
              - 'docs/homebrew.md'
              - '.github/workflows/ci.yml'

  workflow-lint:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 🍞 Setup Bun workspace
        uses: ./.github/actions/setup-bun

      - name: 🔍 Check workflow YAML
        run: bun run check:workflows

      - name: 🧾 Check release manifest metadata
        run: bun run check:release-manifest

  homebrew-formula:
    needs: changes
    if: needs.changes.outputs.homebrew == 'true'
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 🍞 Tap Bun formula
        run: |
          brew tap oven-sh/bun
          # Homebrew Tap-Trust now refuses to load formulae from untrusted
          # taps (the kesha-voice-kit formula depends on oven-sh/bun/bun).
          # Trust the tap so the formula can be loaded below.
          brew trust oven-sh/bun

      - name: 🧪 Create local test tap
        run: |
          brew tap-new local/kesha
          cp packaging/homebrew/Formula/kesha-voice-kit.rb "$(brew --repository local/kesha)/Formula/kesha-voice-kit.rb"

      - name: 📦 Install formula
        run: brew install --build-from-source local/kesha/kesha-voice-kit

      - name: 🔍 Audit formula
        run: brew audit --strict --formula local/kesha/kesha-voice-kit

      - name: 🚬 Test formula
        run: brew test local/kesha/kesha-voice-kit

      - name: 🧹 Uninstall formula
        if: always()
        run: brew uninstall local/kesha/kesha-voice-kit || true

  unit-tests:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 🍞 Setup Bun workspace
        uses: ./.github/actions/setup-bun

      - name: 🔍 Type check
        if: matrix.os == 'ubuntu-latest'
        run: bunx tsc --noEmit

      - name: 🔢 Check version drift (package.json + Cargo.toml)
        if: matrix.os == 'ubuntu-latest'
        run: bun run check:versions

      - name: 🔬 Type check (tsgo / TS 7 preview, advisory)
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: bunx tsgo --noEmit

      - name: 🧪 Unit tests
        run: mkdir -p test-results && bun run test:unit --reporter=junit --reporter-outfile=test-results/unit-${{ matrix.os }}.xml

      - name: 📊 Test summary
        if: always()
        shell: bash
        run: bun .github/scripts/junit-to-markdown.ts "Unit Tests (${{ matrix.os }})" test-results/unit-${{ matrix.os }}.xml >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: test-results/unit-${{ matrix.os }}.xml
          retention-days: 7

      - name: 🪼 Upload to Flakiness.io
        # `if: always()` only guarantees the step runs; it does NOT
        # suppress this step's own exit code. `continue-on-error: true`
        # is what keeps a Flakiness outage / OIDC handshake failure from
        # marking the whole test job red (Greptile #301 P1). Telemetry
        # upload is best-effort, not a release gate.
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          bunx @flakiness/junit-xml test-results/unit-${{ matrix.os }}.xml \
            --category bun --flakiness-project Laputa/kesha-voice-kit

  ts-coverage:
    needs: [changes, unit-tests]
    if: needs.changes.outputs.code == 'true' && needs.unit-tests.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 🍞 Setup Bun workspace
        uses: ./.github/actions/setup-bun

      - name: 📈 Bun coverage
        run: bun run coverage:ts

      - name: 🧯 Enforce TS coverage gates
        run: bun run coverage:check:ts

      - name: 📊 Coverage summary
        if: always()
        shell: bash
        run: |
          if [[ -f coverage/ts/summary.md ]]; then
            cat coverage/ts/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 📤 Upload TS coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-ts
          path: coverage/ts
          retention-days: 30

  integration-tests:
    # FAST lane: runs the full `tests/integration/` suite WITHOUT installing
    # the engine or models. The model-dependent e2e suites
    # (`e2e-engine`, `mcp-e2e`, `say-e2e`) self-skip via
    # `describe.skipIf(!engineInstalled)` when no engine is present, so this
    # lane exercises only the fake/stub-based contract suites
    # (`cli-contracts`, `e2e-cli`, `say`). No `kesha install`, no cache, no
    # download — so it's safe on every PR including release/* branches
    # (no published-engine 404 risk without an install step). Real-engine
    # coverage lives in `integration-tests-full` below, gated to engine/model
    # changes + nightly.
    #
    # Fail-fast: gate on `unit-tests` so a `tsc --noEmit` failure cancels
    # this lane. Safe because `integration` is a strict subset of `code`
    # (see filter design above) — when `integration == 'true'`,
    # `code == 'true'`, so `unit-tests` is never `skipped` here and the
    # standard `result == 'success'` gate is enough.
    needs: [changes, unit-tests]
    if: |
      needs.changes.outputs.integration == 'true' &&
      needs.unit-tests.result == 'success'
    runs-on: macos-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: 🍞 Setup Bun workspace
        uses: ./.github/actions/setup-bun

      - name: 🧪 Integration tests
        run: mkdir -p test-results && bun run test:integration --reporter=junit --reporter-outfile=test-results/integration.xml
        timeout-minutes: 10

      - name: 📊 Test summary
        if: always()
        run: bun .github/scripts/junit-to-markdown.ts "Integration Tests (macos)" test-results/integration.xml >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-integration
          path: test-results/integration.xml
          retention-days: 7

      - name: 🪼 Upload to Flakiness.io
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          bunx @flakiness/junit-xml test-results/integration.xml \
            --category bun --flakiness-project Laputa/kesha-voice-kit

  integration-tests-full:
    # Real-engine integration: installs the ~2.4GB model bundle and runs the
    # model-dependent e2e suites (which self-skip in the fast lane). Gated to
    # engine/model changes, push-to-main of those paths, and the nightly cron —
    # so doc/TS-only PRs never download models. Nightly run on main also seeds
    # the default-branch-scoped model cache. Keep the release/* + chore(release)
    # guards: this lane downloads the PUBLISHED engine, which doesn't exist yet
    # during the release version-bump window.
    needs: [changes, unit-tests]
    # `always()` so a SKIPPED `unit-tests` (rust-only PRs have `code == 'false'`)
    # doesn't skip-propagate and drop the heavy lane — `heavy_e2e` includes
    # `rust/**` but `code` does not, so unit-tests is legitimately skipped on a
    # rust-only PR yet the real-engine e2e must still run (#274 regression class).
    # Still fail-fast if unit-tests actively FAILED/cancelled.
    if: |
      always() &&
      needs.changes.result == 'success' &&
      needs.unit-tests.result != 'failure' &&
      needs.unit-tests.result != 'cancelled' &&
      (
        github.event_name == 'schedule' ||
        (
          needs.changes.outputs.heavy_e2e == 'true' &&
          !startsWith(github.head_ref, 'release/') &&
          !startsWith(github.event.head_commit.message, 'chore(release):')
        )
      )
    runs-on: macos-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7
        with:
          lfs: true
      - name: 🍞 Setup Bun workspace
        uses: ./.github/actions/setup-bun
      - name: 🔊 Setup integration backend
        uses: ./.github/actions/install-kesha-backend
        with:
          cache-path: |
            ~/.cache/kesha
          cache-key: ${{ runner.os }}-kesha-engine-v1
          cache-restore-keys: ${{ runner.os }}-kesha-engine-
      - name: 🧪 Integration tests (real engine)
        run: mkdir -p test-results && bun run test:integration --reporter=junit --reporter-outfile=test-results/integration-full.xml
        timeout-minutes: 12
      - name: 📊 Test summary
        if: always()
        run: bun .github/scripts/junit-to-markdown.ts "Integration Tests — full (macos)" test-results/integration-full.xml >> $GITHUB_STEP_SUMMARY
      - name: 📤 Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-integration-full
          path: test-results/integration-full.xml
          retention-days: 7
      - name: 🪼 Upload to Flakiness.io
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          bunx @flakiness/junit-xml test-results/integration-full.xml \
            --category bun --flakiness-project Laputa/kesha-voice-kit

  published-engine-smoke:
    # P1.10: keep at least one non-Darwin lane exercising the published
    # engine install path. Windows is intentionally omitted while
    # `src/engine-install.ts` still reports win32 x64 as unsupported; this
    # Linux x64 lane covers the currently supported non-Darwin release asset.
    needs: [changes, unit-tests]
    # `always()` so a SKIPPED `unit-tests` (rust-only PRs have `code == 'false'`)
    # doesn't skip-propagate and drop the heavy lane — `heavy_e2e` includes
    # `rust/**` but `code` does not, so unit-tests is legitimately skipped on a
    # rust-only PR yet the real-engine e2e must still run (#274 regression class).
    # Still fail-fast if unit-tests actively FAILED/cancelled.
    if: |
      always() &&
      needs.changes.result == 'success' &&
      needs.unit-tests.result != 'failure' &&
      needs.unit-tests.result != 'cancelled' &&
      (
        github.event_name == 'schedule' ||
        (
          needs.changes.outputs.heavy_e2e == 'true' &&
          !startsWith(github.head_ref, 'release/') &&
          !startsWith(github.event.head_commit.message, 'chore(release):')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: 🍞 Setup Bun workspace
        uses: ./.github/actions/setup-bun

      - name: 🔊 Install published Linux backend
        uses: ./.github/actions/install-kesha-backend
        with:
          cache-path: |
            ~/.cache/kesha
          cache-key: ${{ runner.os }}-kesha-engine-v1
          cache-restore-keys: ${{ runner.os }}-kesha-engine-
          ffmpeg-provider: apt

      - name: 🚬 Smoke published Linux engine
        shell: bash
        run: |
          kesha status
          kesha --json tests/fixtures/benchmark-en/01-check-email.ogg > /tmp/kesha-linux-smoke.json
          bun -e '
            const output = await Bun.file("/tmp/kesha-linux-smoke.json").json();
            if (!Array.isArray(output) || output.length !== 1) {
              throw new Error("expected exactly one transcription result");
            }
            if (!output[0].text || output[0].text.length < 5) {
              throw new Error("expected non-empty transcription text");
            }
          '

  release-branch-engine-smoke:
    # P1.11: release branches cannot download the not-yet-published engine
    # asset, but they still need an end-to-end CLI/backend gate. Build the
    # Linux release-shaped engine locally, mark it as the package's engine
    # version, install models through that binary, then smoke the wrapper.
    needs: [changes, unit-tests]
    if: |
      needs.changes.outputs.integration == 'true' &&
      (
        startsWith(github.head_ref, 'release/') ||
        startsWith(github.event.head_commit.message, 'chore(release):')
      ) &&
      needs.unit-tests.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      KESHA_CACHE_DIR: ${{ github.workspace }}/.kesha-release-smoke
      KESHA_ENGINE_BIN: ${{ github.workspace }}/rust/target/release/kesha-engine
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: 🍞 Setup Bun workspace
        uses: ./.github/actions/setup-bun

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust

      - name: 🎧 Install system audio deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libopus-dev pkg-config

      - name: 🦀 Build local Linux engine
        run: cd rust && cargo build --release --features onnx,tts --no-default-features

      - name: 🧾 Mark local engine version
        run: |
          bun -e '
            const pkg = await Bun.file("package.json").json();
            await Bun.write(`${process.env.KESHA_ENGINE_BIN}.version`, `${pkg.keshaEngine.version}\n`);
          '

      - name: 🔊 Install models through local backend
        uses: ./.github/actions/install-kesha-backend
        with:
          cache-path: |
            ${{ github.workspace }}/.kesha-release-smoke
          cache-key: ${{ runner.os }}-kesha-release-smoke-v1
          cache-restore-keys: ${{ runner.os }}-kesha-release-smoke-
          ffmpeg-provider: apt
          install-args: --onnx

      - name: 🚬 Smoke release branch local engine
        shell: bash
        run: |
          kesha status
          kesha --json tests/fixtures/benchmark-en/01-check-email.ogg > /tmp/kesha-release-smoke.json
          bun -e '
            const output = await Bun.file("/tmp/kesha-release-smoke.json").json();
            if (!Array.isArray(output) || output.length !== 1) {
              throw new Error("expected exactly one transcription result");
            }
            if (!output[0].text || output[0].text.length < 5) {
              throw new Error("expected non-empty transcription text");
            }
          '

  tts-e2e:
    # Runs whenever rust engine code, the TS CLI that drives `kesha say`,
    # or the say-e2e test itself changes. Wait for `unit-tests` so a red
    # typecheck/unit lane fail-fasts this expensive macOS TTS lane. Keep
    # `always()` because rust-only PRs have `code == 'false'`, so `unit-tests`
    # is legitimately skipped; those still need the TTS engine coverage that
    # #274 accidentally dropped when relying on normal skip propagation.
    needs: [changes, unit-tests]
    if: |
      always() &&
      needs.changes.result == 'success' &&
      needs.unit-tests.result != 'failure' &&
      needs.unit-tests.result != 'cancelled' &&
      (
        github.event_name == 'schedule' ||
        (
          needs.changes.outputs.heavy_e2e == 'true' &&
          !startsWith(github.head_ref, 'release/') &&
          !startsWith(github.event.head_commit.message, 'chore(release):')
        )
      )
    # Pinned (matches build-engine.yml): this is the only CI lane that
    # builds the engine from source on macOS, and macos-latest's floating
    # Xcode 16.4 fails to link (`clang_rt.osx not found`).
    runs-on: macos-14
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    env:
      KOKORO_CACHE: ${{ github.workspace }}/.kokoro-spike
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 🍎 Pin Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: "16.2"

      - name: 🍞 Setup Bun workspace
        uses: ./.github/actions/setup-bun

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust
          # Flush caches poisoned before #554, when this lane ran on
          # macos-latest/Xcode 16.4: their build-script `rustc-link-search`
          # hardcoded that Xcode's clang resource dir, so the link step failed
          # with `clang_rt.osx not found` even after the Xcode 16.2 pin. Bump
          # this discriminator if the stale path ever resurfaces.
          key: xcode-16.2

      - name: 💾 Cache Kokoro models
        uses: actions/cache@v6
        with:
          path: ${{ env.KOKORO_CACHE }}
          key: kokoro-spike-v5-${{ runner.os }}

      - name: 📥 Download Kokoro models (if cache miss)
        run: bash rust/ci/download-kokoro.sh "$KOKORO_CACHE"

      - name: 🎧 Install system Opus
        # audiopus_sys / opusic-sys fall back to a cmake build of vendored
        # libopus when pkg-config can't locate it, and the vendored
        # CMakeLists.txt is incompatible with macOS runner cmake ≥4. Install
        # the system lib so pkg-config succeeds and cmake never runs.
        run: brew install opus pkg-config

      - name: 🦀 Build kesha-engine from source (with TTS)
        env:
          LIBCLANG_PATH: /Library/Developer/CommandLineTools/usr/lib
          RUSTFLAGS: "-L /opt/homebrew/lib"
        run: cd rust && cargo build --release

      - name: 🧪 TTS e2e tests
        env:
          KOKORO_MODEL: ${{ env.KOKORO_CACHE }}/model.onnx
          KOKORO_VOICE: ${{ env.KOKORO_CACHE }}/am_michael.bin
          # Vosk-ru lives under this dir (see rust/ci/download-kokoro.sh)
          # — runtime loader resolves it via `models::vosk_ru_model_dir()`.
          KESHA_CACHE_DIR: ${{ env.KOKORO_CACHE }}
          KESHA_ENGINE_BIN: ${{ github.workspace }}/rust/target/release/kesha-engine
          DYLD_FALLBACK_LIBRARY_PATH: /opt/homebrew/lib
        run: |
          mkdir -p test-results
          bun test tests/integration/say-e2e.test.ts \
            --reporter=junit --reporter-outfile=test-results/tts-e2e.xml

      - name: 📊 Test summary
        if: always()
        run: bun .github/scripts/junit-to-markdown.ts "TTS E2E Tests (macos)" test-results/tts-e2e.xml >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-tts-e2e
          path: test-results/tts-e2e.xml
          retention-days: 7

      - name: 🪼 Upload to Flakiness.io
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          bunx @flakiness/junit-xml test-results/tts-e2e.xml \
            --category bun --flakiness-project Laputa/kesha-voice-kit

  raycast-lint:
    needs: changes
    if: needs.changes.outputs.raycast == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: raycast
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 📦 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: raycast/package-lock.json

      - name: 📦 Install
        run: npm ci

      - name: 🔍 Lint (ray lint includes tsc --noEmit)
        run: npm run lint

  # Supplementary post-merge check: verify the Nix flake still evaluates and
  # the engine derivation builds after relevant changes land on main. Does NOT
  # replace `build-engine.yml` — distributable release artifacts
  # continue to go through Github-runner cargo + Swift toolchain pins.
  #
  # Currently builds only `.#kesha-engine`. The Bun wrapper package
  # `.#kesha` uses a fixed-output derivation whose `outputHash` requires
  # a nix-equipped developer to populate (see flake.nix `keshaNodeModules`
  # block + #264 plan T5); CI without that hash can't build it.
  #
  # macos-14 is Apple Silicon (aarch64-darwin). It exercises the Darwin-
  # only flake paths: Swift toolchain via nixpkgs, the Apple SDK
  # frameworks input, and the `say-avspeech` Swift sidecar stage-in
  # inside the engine derivation's postInstall. The lane uses the
  # `onnx,tts,system_tts` feature set — not `coreml,tts,system_tts` —
  # because `fluidaudio-rs`'s build.rs invokes `swift build`, which
  # tries to clone FluidAudio.git inside the offline Nix sandbox.
  # The canonical darwin release (build-engine.yml, pinned Xcode 16.2)
  # still ships the CoreML backend.
  nix-build:
    needs: changes
    if: github.event_name == 'push' && needs.changes.outputs.nix == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: ❄️  Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      # No remote Nix cache: DeterminateSystems retired the free
      # `magic-nix-cache-action` backend (the macos-14 row of this job hung
      # in `Setup Nix cache` for the full 35-min timeout). FlakeHub Cache
      # works but requires auth; revisit if cold builds become painful.

      - name: 🔍 Validate flake metadata
        run: nix flake metadata --no-update-lock-file

      - name: 🦀 Build kesha-engine
        run: nix build .#kesha-engine --no-update-lock-file -L

      - name: 🚬 Smoke
        run: ./result/bin/kesha-engine --version

  # Aggregator gate = the single required status check for branch protection.
  # Always runs so 🧪 CI reports on every PR; the path-gated jobs above skip on
  # unrelated PRs (→ success). The step fails the gate only if a real job failed.
  ci:
    name: 🧪 CI
    if: always()
    needs:
      - changes
      - workflow-lint
      - homebrew-formula
      - unit-tests
      - ts-coverage
      - integration-tests
      - integration-tests-full
      - published-engine-smoke
      - release-branch-engine-smoke
      - tts-e2e
      - raycast-lint
      - nix-build
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
