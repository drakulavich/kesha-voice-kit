name: 🧪 CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      integration: ${{ steps.filter.outputs.integration }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔍 Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig.json'
            integration:
              - 'src/**'
              - 'tests/integration/**'
              - 'fixtures/**'
              - 'swift/**'

  unit-tests:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🍞 Setup Bun workspace
        uses: ./.github/actions/setup-bun

      - name: 🔍 Type check
        run: bunx tsc --noEmit

      - name: 🧪 Unit tests
        run: mkdir -p test-results && bun run test:unit --reporter=junit --reporter-outfile=test-results/unit-${{ matrix.os }}.xml

      - name: 📊 Test summary
        if: always()
        shell: bash
        run: bun .github/scripts/junit-to-markdown.ts "Unit Tests (${{ matrix.os }})" test-results/unit-${{ matrix.os }}.xml >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: test-results/unit-${{ matrix.os }}.xml
          retention-days: 7

  integration-tests:
    needs: changes
    if: needs.changes.outputs.integration == 'true'
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: 🍞 Setup Bun workspace
        uses: ./.github/actions/setup-bun

      - name: 🦜 Setup integration backend
        uses: ./.github/actions/install-parakeet-backend
        with:
          cache-path: |
            ~/.cache/parakeet/coreml
            ~/Library/Caches/FluidAudio
          cache-key: ${{ runner.os }}-parakeet-coreml-v3
          cache-restore-keys: ${{ runner.os }}-parakeet-coreml-
          ffmpeg-provider: brew
          install-args: --coreml

      - name: 🧪 Integration tests
        run: mkdir -p test-results && bun run test:integration --reporter=junit --reporter-outfile=test-results/integration.xml
        timeout-minutes: 10

      - name: 📊 Test summary
        if: always()
        run: bun .github/scripts/junit-to-markdown.ts "Integration Tests (macos)" test-results/integration.xml >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-integration
          path: test-results/integration.xml
          retention-days: 7

  pr-comment:
    if: always() && github.event_name == 'pull_request' && (needs.unit-tests.result == 'success' || needs.integration-tests.result == 'success')
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🍞 Setup Bun workspace
        uses: ./.github/actions/setup-bun

      - name: 📥 Download all test results
        uses: actions/download-artifact@v4
        with:
          path: all-results
          pattern: test-results-*

      - name: 📝 Generate PR comment
        run: bun .github/scripts/generate-pr-comment.ts all-results /tmp/pr-comment.md

      - name: 💬 Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: /tmp/pr-comment.md
